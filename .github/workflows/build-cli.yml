name: Build CLI

on:
  push:
    tags:
      - "shimmy-cli-v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: shimmy-cli
          - platform: macos-latest
            target: aarch64-apple-darwin
            binary: shimmy-cli
          - platform: macos-latest
            target: x86_64-apple-darwin
            binary: shimmy-cli
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            binary: shimmy-cli.exe

    runs-on: ${{ matrix.platform }}
    name: CLI (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2.9.1

      - name: Build shimmy-cli
        run: cargo build --release --package shimmy-cli --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: shimmy-cli-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  release:
    needs: [build-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/shimmy-cli-*/; do
            target=$(basename "$dir" | sed 's/shimmy-cli-//')
            find "$dir" -type f \( -name "shimmy-cli" -o -name "shimmy-cli.exe" \) | while read f; do
              ext=""
              [[ "$f" == *.exe ]] && ext=".exe"
              cp "$f" "release-assets/shimmy-cli-${target}${ext}"
            done
          done
          echo "Release assets:"
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: shimmy-cli ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
